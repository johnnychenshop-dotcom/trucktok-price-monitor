name: Daily TruckTok price monitor

on:
  schedule:
    # 02:00 UTC = 10:00 Asia/Shanghai
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trucktok-price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape prices and send alerts
        env:
          MONITOR_TIMEZONE: Asia/Shanghai
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
        run: python price_monitor.py

      - name: Commit updated CSV files
        run: |
          if [ -z "$(git status --porcelain -- prices.csv price_changes.csv)" ]; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.csv price_changes.csv
          git commit -m "chore: update TruckTok prices $(date -u +%F)"
          git push
